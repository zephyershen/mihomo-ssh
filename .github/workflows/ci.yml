name: Fast CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  frontend-check:
    name: Frontend build and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Test frontend
        run: npm test


name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    name: Build NSIS installer
    runs-on: windows-2022
    env:
      RUST_BACKTRACE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Check frontend
        run: npm run build

      - name: Test frontend
        run: npm test

      - name: Build Windows installer
        shell: pwsh
        run: |
          npm run package 2>&1 | Tee-Object -FilePath build-windows.log
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0) {
            if (Test-Path build-windows.log) {
              $tail = [string]::Join([Environment]::NewLine, (Get-Content build-windows.log -Tail 120))
            } else {
              $tail = "build-windows.log was not created."
            }
            $escaped = $tail.Replace("%", "%25").Replace("`r", "%0D").Replace("`n", "%0A")
            Write-Host "::error title=Windows packaging failed::$escaped"
            exit $exitCode
          }

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-server-manager-windows
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-windows-log
          path: build-windows.log
          if-no-files-found: ignore
